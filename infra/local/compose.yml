name: mygm-local

services:
  api:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    profiles:
      - api
      - app
    working_dir: /workspace/services/api
    command: uv run uvicorn mygm_api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ../../.env.alpha.local.example
    environment:
      MYGM_ALLOWED_ORIGINS: http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - ../../:/workspace

  worker:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    profiles:
      - worker
      - app
    working_dir: /workspace/services/worker
    command: uv run mygm-worker analyze-fixture --fixture-root ../../tests/fixtures/espn/league_18254195 --out ../../.omo/evidence/compose-worker-fixture
    env_file:
      - ../../.env.alpha.local.example
    volumes:
      - ../../:/workspace

  web:
    image: node:22-bookworm
    profiles:
      - web
      - app
    working_dir: /workspace/apps/web
    command: sh -lc "npm install && npm run dev -- --port 3000"
    env_file:
      - ../../.env.alpha.local.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    volumes:
      - ../../:/workspace
